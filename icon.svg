<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient - Apple Blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a8fff"/>
      <stop offset="50%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#0050CC"/>
    </linearGradient>
    <!-- Shine overlay -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- House gradient -->
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.98)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.88)"/>
    </linearGradient>
    <!-- Rupee gradient -->
    <linearGradient id="rupeeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#0050CC"/>
    </linearGradient>
    <!-- Gold accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD60A"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,80,200,0.35)"/>
    </filter>
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
    <!-- Rounded rect clip -->
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle grid pattern -->
  <g clip-path="url(#roundedClip)" opacity="0.07">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="420" cy="100" r="60" fill="rgba(255,255,255,0.07)"/>
  <circle cx="90" cy="410" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="460" cy="390" r="40" fill="rgba(255,255,255,0.06)"/>

  <!-- HOUSE shape (white, clean) -->
  <g filter="url(#innerShadow)">
    <!-- Roof -->
    <polygon points="256,95 390,215 122,215" fill="url(#houseGrad)" rx="4"/>
    <!-- Roof ridge accent (gold) -->
    <polygon points="256,95 280,117 232,117" fill="url(#goldGrad)" opacity="0.9"/>
    <!-- Chimney -->
    <rect x="310" y="120" width="24" height="50" rx="4" fill="rgba(255,255,255,0.7)"/>
    <!-- House body -->
    <rect x="148" y="210" width="228" height="175" rx="8" fill="url(#houseGrad)"/>
    <!-- Door -->
    <rect x="222" y="290" width="68" height="95" rx="8" fill="url(#rupeeGrad)"/>
    <!-- Door knob -->
    <circle cx="280" cy="340" r="5" fill="url(#goldGrad)"/>
    <!-- Left window -->
    <rect x="165" y="240" width="48" height="44" rx="8" fill="rgba(0,122,255,0.18)"/>
    <line x1="189" y1="240" x2="189" y2="284" stroke="rgba(0,122,255,0.3)" stroke-width="2"/>
    <line x1="165" y1="262" x2="213" y2="262" stroke="rgba(0,122,255,0.3)" stroke-width="2"/>
    <!-- Right window -->
    <rect x="299" y="240" width="48" height="44" rx="8" fill="rgba(0,122,255,0.18)"/>
    <line x1="323" y1="240" x2="323" y2="284" stroke="rgba(0,122,255,0.3)" stroke-width="2"/>
    <line x1="299" y1="262" x2="347" y2="262" stroke="rgba(0,122,255,0.3)" stroke-width="2"/>
  </g>

  <!-- RUPEE SYMBOL (₹) badge bottom right -->
  <circle cx="370" cy="370" r="60" fill="url(#goldGrad)" opacity="0.95"/>
  <circle cx="370" cy="370" r="54" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- ₹ text -->
  <text x="370" y="393" text-anchor="middle"
    font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
    font-size="58" font-weight="900" fill="white" opacity="0.97"
    style="letter-spacing:-2px">₹</text>

  <!-- CHART bars (bottom left) — finance indicator -->
  <g opacity="0.9">
    <rect x="76" y="360" width="18" height="55" rx="5" fill="rgba(255,255,255,0.5)"/>
    <rect x="102" y="335" width="18" height="80" rx="5" fill="rgba(255,255,255,0.7)"/>
    <rect x="128" y="348" width="18" height="67" rx="5" fill="rgba(255,255,255,0.6)"/>
  </g>
  <!-- Chart baseline -->
  <line x1="70" y1="418" x2="152" y2="418" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>

  <!-- Top shine overlay -->
  <rect width="512" height="256" rx="115" fill="url(#shineGrad)" clip-path="url(#roundedClip)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="115" ry="115" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
</svg>
