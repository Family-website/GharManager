<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GharManager - Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #F7F8FC 0%, #EEF2FF 55%, #F5F3FF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #1E2433;
            text-align: center;
            padding: 20px;
        }
        .icon-box {
            width: 88px;
            height: 88px;
            border-radius: 26px;
            background: #FFFFFF;
            border: 1px solid rgba(79,70,229,0.12);
            box-shadow: 0 12px 30px rgba(79,70,229,0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
        }
        .icon { font-size: 40px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; color: #1E2433; }
        p { font-size: 15px; color: #6B7280; margin-bottom: 30px; line-height: 1.6; }
        button {
            background: linear-gradient(135deg, #4F46E5, #818CF8);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.28);
        }
    </style>
</head>
<body>
    <div class="icon-box"><span class="icon">🏠</span></div>
    <h1>Aap Offline Hain</h1>
    <p>Internet connection nahi mili.<br>Connect hone ke baad app automatically sync ho jayega.</p>
    <button onclick="window.location.reload()">🔄 Dobara Try Karo</button>
</body>
</html>
